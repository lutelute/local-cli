<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="798" height="198" rx="11" fill="none" stroke="#444" stroke-width="1"/>

  <!-- Terminal icon -->
  <rect x="40" y="45" width="110" height="110" rx="16" fill="#333" stroke="#555" stroke-width="1.5"/>
  <!-- Terminal dots -->
  <circle cx="62" cy="65" r="5" fill="#666"/>
  <circle cx="78" cy="65" r="5" fill="#555"/>
  <circle cx="94" cy="65" r="5" fill="#444"/>
  <!-- Terminal prompt -->
  <text x="58" y="105" font-family="Menlo, Monaco, Consolas, monospace" font-size="28" font-weight="bold" fill="#aaa">&gt;_</text>
  <!-- Cursor blink -->
  <rect x="100" y="85" width="3" height="24" fill="#888">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Code lines -->
  <rect x="58" y="120" width="45" height="4" rx="2" fill="#555"/>
  <rect x="58" y="132" width="70" height="4" rx="2" fill="#444"/>

  <!-- Title -->
  <text x="180" y="95" font-family="Menlo, Monaco, Consolas, monospace" font-size="48" font-weight="bold" fill="#e0e0e0" letter-spacing="-1">local-cli</text>

  <!-- Subtitle -->
  <text x="183" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#888">Local-first AI coding agent powered by Ollama</text>

  <!-- Tags -->
  <rect x="183" y="140" width="80" height="22" rx="4" fill="#333" stroke="#555" stroke-width="0.5"/>
  <text x="195" y="155" font-family="Menlo, Monaco, monospace" font-size="11" fill="#aaa">Python 3.10+</text>

  <rect x="273" y="140" width="55" height="22" rx="4" fill="#333" stroke="#555" stroke-width="0.5"/>
  <text x="282" y="155" font-family="Menlo, Monaco, monospace" font-size="11" fill="#aaa">0 deps</text>

  <rect x="338" y="140" width="55" height="22" rx="4" fill="#333" stroke="#555" stroke-width="0.5"/>
  <text x="347" y="155" font-family="Menlo, Monaco, monospace" font-size="11" fill="#aaa">Ollama</text>

  <rect x="403" y="140" width="55" height="22" rx="4" fill="#333" stroke="#555" stroke-width="0.5"/>
  <text x="412" y="155" font-family="Menlo, Monaco, monospace" font-size="11" fill="#aaa">Claude</text>

  <rect x="468" y="140" width="70" height="22" rx="4" fill="#333" stroke="#555" stroke-width="0.5"/>
  <text x="478" y="155" font-family="Menlo, Monaco, monospace" font-size="11" fill="#aaa">Electron</text>

  <!-- Version badge -->
  <rect x="700" y="16" width="80" height="24" rx="12" fill="#333" stroke="#666" stroke-width="0.5"/>
  <text x="722" y="33" font-family="Menlo, Monaco, monospace" font-size="13" fill="#aaa">v0.5.0</text>
</svg>
